<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .card { fill: #161b22; stroke: #30363d; stroke-width: 1.5; rx: 8; ry: 8; }
      .card-accent { fill: #161b22; stroke: #58a6ff; stroke-width: 1.5; rx: 8; ry: 8; }
      .card-green { fill: #161b22; stroke: #3fb950; stroke-width: 1.5; rx: 8; ry: 8; }
      .card-purple { fill: #161b22; stroke: #bc8cff; stroke-width: 1.5; rx: 8; ry: 8; }
      .title { fill: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 600; }
      .label { fill: #8b949e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 11px; }
      .text { fill: #c9d1d9; font-family: 'SF Mono', 'Fira Code', 'Fira Mono', monospace; font-size: 10.5px; }
      .text-small { fill: #8b949e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 10px; }
      .heading { fill: #58a6ff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 700; }
      .heading-green { fill: #3fb950; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 700; }
      .heading-purple { fill: #bc8cff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 700; }
      .connector { stroke: #30363d; stroke-width: 1.2; fill: none; }
      .connector-accent { stroke: #58a6ff; stroke-width: 1.2; fill: none; stroke-dasharray: 4,3; }
      .agent-icon { fill: #161b22; stroke: #30363d; stroke-width: 1; rx: 6; ry: 6; }
      .agent-text { fill: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 9.5px; font-weight: 500; text-anchor: middle; }
      .badge { fill: #1f6feb; rx: 4; ry: 4; }
      .badge-text { fill: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 9px; font-weight: 600; text-anchor: middle; }
      .section-label { fill: #484f58; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="1200" height="800"/>

  <!-- ═══════════════════ TOP ROW: AI Agents ═══════════════════ -->
  <text class="section-label" x="600" y="28" text-anchor="middle">AI AGENTS</text>

  <!-- Agent icons -->
  <g>
    <!-- Claude -->
    <rect class="agent-icon" x="108" y="38" width="72" height="30"/>
    <text class="agent-text" x="144" y="57">Claude</text>
    <!-- Cursor -->
    <rect class="agent-icon" x="192" y="38" width="72" height="30"/>
    <text class="agent-text" x="228" y="57">Cursor</text>
    <!-- Gemini -->
    <rect class="agent-icon" x="276" y="38" width="72" height="30"/>
    <text class="agent-text" x="312" y="57">Gemini</text>
    <!-- Windsurf -->
    <rect class="agent-icon" x="360" y="38" width="72" height="30"/>
    <text class="agent-text" x="396" y="57">Windsurf</text>
    <!-- OpenCode -->
    <rect class="agent-icon" x="444" y="38" width="78" height="30"/>
    <text class="agent-text" x="483" y="57">OpenCode</text>
    <!-- Codex -->
    <rect class="agent-icon" x="534" y="38" width="72" height="30"/>
    <text class="agent-text" x="570" y="57">Codex</text>
    <!-- Cline -->
    <rect class="agent-icon" x="618" y="38" width="72" height="30"/>
    <text class="agent-text" x="654" y="57">Cline</text>
    <!-- Copilot -->
    <rect class="agent-icon" x="702" y="38" width="72" height="30"/>
    <text class="agent-text" x="738" y="57">Copilot</text>
    <!-- Any Agent -->
    <rect class="agent-icon" x="786" y="38" width="78" height="30" stroke-dasharray="3,2"/>
    <text class="agent-text" x="825" y="57" fill="#8b949e">Any Agent</text>
  </g>

  <!-- Connector lines from agents to MCP box -->
  <line class="connector" x1="144" y1="68" x2="144" y2="86"/>
  <line class="connector" x1="228" y1="68" x2="228" y2="86"/>
  <line class="connector" x1="312" y1="68" x2="312" y2="86"/>
  <line class="connector" x1="396" y1="68" x2="396" y2="86"/>
  <line class="connector" x1="483" y1="68" x2="483" y2="86"/>
  <line class="connector" x1="570" y1="68" x2="570" y2="86"/>
  <line class="connector" x1="654" y1="68" x2="654" y2="86"/>
  <line class="connector" x1="738" y1="68" x2="738" y2="86"/>
  <line class="connector" x1="825" y1="68" x2="825" y2="86"/>
  <!-- Horizontal bar -->
  <line class="connector" x1="144" y1="86" x2="825" y2="86"/>
  <!-- Single line down -->
  <line class="connector" x1="484" y1="86" x2="484" y2="100"/>

  <!-- MCP Server / Tool Schema box -->
  <rect class="card-accent" x="340" y="100" width="290" height="32"/>
  <text class="heading" x="485" y="121" text-anchor="middle">MCP Server / Tool Schema</text>

  <!-- Connector from MCP to CLI -->
  <line class="connector-accent" x1="485" y1="132" x2="485" y2="155"/>

  <!-- ═══════════════════ MIDDLE ROW: kxn-cli ═══════════════════ -->
  <rect class="card-accent" x="140" y="155" width="690" height="130"/>
  <text class="heading" x="485" y="178" text-anchor="middle">kxn-cli</text>

  <!-- Command entries -->
  <g>
    <!-- Row 1 -->
    <rect fill="#0d1117" rx="4" ry="4" x="160" y="190" width="210" height="26"/>
    <text class="text" x="172" y="207">kxn &lt;URI&gt;</text>
    <text class="text-small" x="280" y="207">one-shot scan</text>

    <rect fill="#0d1117" rx="4" ry="4" x="380" y="190" width="210" height="26"/>
    <text class="text" x="392" y="207">kxn monitor</text>
    <text class="text-small" x="500" y="207">daemon</text>

    <rect fill="#0d1117" rx="4" ry="4" x="600" y="190" width="218" height="26"/>
    <text class="text" x="612" y="207">kxn serve --mcp</text>
    <text class="text-small" x="740" y="207">AI agents</text>

    <!-- Row 2 -->
    <rect fill="#0d1117" rx="4" ry="4" x="160" y="224" width="210" height="26"/>
    <text class="text" x="172" y="241">kxn serve --webhook</text>
    <text class="text-small" x="330" y="241">reactive</text>

    <rect fill="#0d1117" rx="4" ry="4" x="380" y="224" width="210" height="26"/>
    <text class="text" x="392" y="241">kxn tools</text>
    <text class="text-small" x="480" y="241">schema export</text>

    <rect fill="#0d1117" rx="4" ry="4" x="600" y="224" width="218" height="26"/>
    <text class="text" x="612" y="241">kxn cve-update</text>
    <text class="text-small" x="730" y="241">CVE sync</text>
  </g>

  <!-- Connector lines from CLI to bottom crates -->
  <line class="connector" x1="260" y1="285" x2="260" y2="320"/>
  <line class="connector" x1="485" y1="285" x2="485" y2="320"/>
  <line class="connector" x1="710" y1="285" x2="710" y2="320"/>

  <!-- ═══════════════════ BOTTOM ROW: Three crates ═══════════════════ -->

  <!-- kxn-rules -->
  <rect class="card-green" x="100" y="320" width="300" height="120"/>
  <text class="heading-green" x="250" y="345" text-anchor="middle">kxn-rules</text>
  <rect class="badge" x="180" y="355" width="140" height="18"/>
  <text class="badge-text" x="250" y="367">736+ TOML rules</text>
  <text class="text-small" x="250" y="393" text-anchor="middle">CIS benchmarks (SSH, K8s, AWS, Azure, GCP)</text>
  <text class="text-small" x="250" y="407" text-anchor="middle">OWASP API Top 10 / CVE detection</text>
  <text class="text-small" x="250" y="421" text-anchor="middle">IAM, TLS, monitoring, databases</text>

  <!-- kxn-core -->
  <rect class="card-accent" x="420" y="320" width="240" height="120"/>
  <text class="heading" x="540" y="345" text-anchor="middle">kxn-core</text>
  <text class="title" x="540" y="367" text-anchor="middle">Rules Engine</text>
  <rect class="badge" x="478" y="375" width="124" height="18"/>
  <text class="badge-text" x="540" y="387">16 conditions</text>
  <text class="text-small" x="540" y="408" text-anchor="middle">EQUAL, REGEX, INCLUDE, SUP/INF</text>
  <text class="text-small" x="540" y="422" text-anchor="middle">ParentRules (AND/OR/NAND/NOR)</text>

  <!-- kxn-providers -->
  <rect class="card-purple" x="680" y="320" width="310" height="120"/>
  <text class="heading-purple" x="835" y="345" text-anchor="middle">kxn-providers</text>
  <text class="text-small" x="835" y="365" text-anchor="middle">
    <tspan>9 native providers</tspan>
  </text>
  <text class="text-small" x="835" y="380" text-anchor="middle">ssh, postgresql, mysql, mongodb, k8s, github, http, grpc, docker</text>
  <rect class="badge" x="770" y="388" width="130" height="18"/>
  <text class="badge-text" x="835" y="400">3000+ Terraform</text>
  <text class="text-small" x="835" y="421" text-anchor="middle">gRPC bridge (tfplugin5 + tfplugin6)</text>
  <text class="text-small" x="835" y="435" text-anchor="middle">CVE DB (SQLite, NVD)</text>

  <!-- Connectors between crates -->
  <line class="connector" x1="400" y1="380" x2="420" y2="380" marker-end="url(#arrow)"/>
  <line class="connector" x1="660" y1="380" x2="680" y2="380" marker-end="url(#arrow)"/>

  <!-- ═══════════════════ BELOW PROVIDERS: Outputs ═══════════════════ -->

  <!-- Connectors down -->
  <line class="connector" x1="300" y1="440" x2="300" y2="475"/>
  <line class="connector" x1="670" y1="440" x2="670" y2="475"/>

  <!-- Alerts section -->
  <rect class="card" x="100" y="475" width="430" height="105"/>
  <text class="title" x="120" y="498">Alerts</text>
  <rect fill="#da3633" rx="3" ry="3" x="160" y="487" width="26" height="16"/>
  <text class="badge-text" x="173" y="498">14</text>

  <g>
    <rect fill="#0d1117" rx="3" ry="3" x="115" y="508" width="58" height="22"/>
    <text class="text" x="127" y="523">Slack</text>
    <rect fill="#0d1117" rx="3" ry="3" x="180" y="508" width="68" height="22"/>
    <text class="text" x="192" y="523">Discord</text>
    <rect fill="#0d1117" rx="3" ry="3" x="255" y="508" width="58" height="22"/>
    <text class="text" x="267" y="523">Teams</text>
    <rect fill="#0d1117" rx="3" ry="3" x="320" y="508" width="48" height="22"/>
    <text class="text" x="332" y="523">Jira</text>
    <rect fill="#0d1117" rx="3" ry="3" x="375" y="508" width="80" height="22"/>
    <text class="text" x="387" y="523">PagerDuty</text>
    <rect fill="#0d1117" rx="3" ry="3" x="462" y="508" width="56" height="22"/>
    <text class="text" x="474" y="523">Email</text>

    <rect fill="#0d1117" rx="3" ry="3" x="115" y="538" width="70" height="22"/>
    <text class="text" x="127" y="553">Webhook</text>
    <rect fill="#0d1117" rx="3" ry="3" x="192" y="538" width="72" height="22"/>
    <text class="text" x="204" y="553">Opsgenie</text>
    <rect fill="#0d1117" rx="3" ry="3" x="271" y="538" width="80" height="22"/>
    <text class="text" x="283" y="553">Datadog</text>
    <rect fill="#0d1117" rx="3" ry="3" x="358" y="538" width="66" height="22"/>
    <text class="text" x="370" y="553">Splunk</text>
    <rect fill="#0d1117" rx="3" ry="3" x="431" y="538" width="88" height="22"/>
    <text class="text" x="443" y="553">ServiceNow</text>
  </g>

  <!-- Save section -->
  <rect class="card" x="550" y="475" width="440" height="105"/>
  <text class="title" x="570" y="498">Save</text>
  <rect fill="#1f6feb" rx="3" ry="3" x="604" y="487" width="26" height="16"/>
  <text class="badge-text" x="617" y="498">16</text>

  <g>
    <rect fill="#0d1117" rx="3" ry="3" x="565" y="508" width="82" height="22"/>
    <text class="text" x="577" y="523">PostgreSQL</text>
    <rect fill="#0d1117" rx="3" ry="3" x="654" y="508" width="56" height="22"/>
    <text class="text" x="666" y="523">MySQL</text>
    <rect fill="#0d1117" rx="3" ry="3" x="717" y="508" width="68" height="22"/>
    <text class="text" x="729" y="523">MongoDB</text>
    <rect fill="#0d1117" rx="3" ry="3" x="792" y="508" width="54" height="22"/>
    <text class="text" x="804" y="523">Kafka</text>
    <rect fill="#0d1117" rx="3" ry="3" x="853" y="508" width="90" height="22"/>
    <text class="text" x="865" y="523">Elasticsearch</text>

    <rect fill="#0d1117" rx="3" ry="3" x="565" y="538" width="34" height="22"/>
    <text class="text" x="574" y="553">S3</text>
    <rect fill="#0d1117" rx="3" ry="3" x="606" y="538" width="40" height="22"/>
    <text class="text" x="615" y="553">GCS</text>
    <rect fill="#0d1117" rx="3" ry="3" x="653" y="538" width="72" height="22"/>
    <text class="text" x="665" y="553">Az Blob</text>
    <rect fill="#0d1117" rx="3" ry="3" x="732" y="538" width="82" height="22"/>
    <text class="text" x="744" y="553">OpenSearch</text>
    <rect fill="#0d1117" rx="3" ry="3" x="821" y="538" width="60" height="22"/>
    <text class="text" x="833" y="553">JSONL</text>
    <rect fill="#0d1117" rx="3" ry="3" x="888" y="538" width="48" height="22"/>
    <text class="text" x="900" y="553">Redis</text>
  </g>

  <!-- ═══════════════════ FAR RIGHT: Output formats ═══════════════════ -->
  <rect class="card" x="1020" y="155" width="150" height="190"/>
  <text class="title" x="1095" y="178" text-anchor="middle">Output Formats</text>

  <rect fill="#0d1117" rx="3" ry="3" x="1035" y="190" width="120" height="22"/>
  <text class="text" x="1095" y="205" text-anchor="middle">text</text>

  <rect fill="#0d1117" rx="3" ry="3" x="1035" y="218" width="120" height="22"/>
  <text class="text" x="1095" y="233" text-anchor="middle">json</text>

  <rect fill="#0d1117" rx="3" ry="3" x="1035" y="246" width="120" height="22"/>
  <text class="text" x="1095" y="261" text-anchor="middle">csv</text>

  <rect fill="#0d1117" rx="3" ry="3" x="1035" y="274" width="120" height="22"/>
  <text class="text" x="1095" y="289" text-anchor="middle">toml</text>

  <rect fill="#0d1117" rx="3" ry="3" x="1035" y="302" width="120" height="22"/>
  <text class="text" x="1095" y="317" text-anchor="middle">html</text>

  <rect fill="#0d1117" rx="3" ry="3" x="1035" y="330" width="120" height="22"/>
  <text class="text" x="1095" y="345" text-anchor="middle" fill="#3fb950">minimal</text>

  <!-- Connector from CLI to output formats -->
  <line class="connector" x1="830" y1="220" x2="1020" y2="220"/>

  <!-- ═══════════════════ Footer ═══════════════════ -->
  <text class="text-small" x="600" y="610" text-anchor="middle" fill="#484f58">kxn — Kexa Next Generation — Multi-cloud compliance scanner in Rust</text>

</svg>