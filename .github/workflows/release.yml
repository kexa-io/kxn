name: Release

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.0)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          # TODO: aarch64-unknown-linux-gnu needs cross-compilation toolchain for native-tls/ssh2
          # - target: aarch64-unknown-linux-gnu
          #   os: ubuntu-latest
          #   archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p kxn-cli

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../kxn-${{ matrix.target }}.${{ matrix.archive }} kxn
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kxn-${{ matrix.target }}
          path: kxn-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -name "*.tar.gz" -exec cp {} release/ \;

      - name: Create checksums
        run: |
          cd release
          sha256sum * > checksums.txt

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: kxn ${{ steps.version.outputs.version }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    name: Update Homebrew tap
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: version
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.event.release.tag_name }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download binaries from private repo
        run: |
          gh release download "${{ steps.version.outputs.tag }}" \
            --repo kexa-io/kxn \
            --pattern "*.tar.gz" \
            --pattern "checksums.txt" \
            --dir release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload binaries to public homebrew-tap release
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          # Create or update the release on the public tap repo
          gh release create "$TAG" \
            --repo kexa-io/homebrew-tap \
            --title "kxn $TAG" \
            --notes "Binaries for kxn $TAG" \
            release/* \
          || gh release upload "$TAG" \
            --repo kexa-io/homebrew-tap \
            --clobber \
            release/*
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Parse checksums
        id: sha
        run: |
          echo "arm=$(grep aarch64-apple-darwin release/checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "intel=$(grep x86_64-apple-darwin release/checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux=$(grep x86_64-unknown-linux-gnu release/checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          cat > kxn.rb << 'FORMULA'
          class Kxn < Formula
            desc "Kexa Next Gen — multi-cloud compliance scanner in Rust"
            homepage "https://github.com/kexa-io/kxn"
            version "VERSION_PLACEHOLDER"
            license "Apache-2.0"

            on_macos do
              on_intel do
                url "https://github.com/kexa-io/homebrew-tap/releases/download/TAG_PLACEHOLDER/kxn-x86_64-apple-darwin.tar.gz"
                sha256 "SHA_INTEL_PLACEHOLDER"
              end
              on_arm do
                url "https://github.com/kexa-io/homebrew-tap/releases/download/TAG_PLACEHOLDER/kxn-aarch64-apple-darwin.tar.gz"
                sha256 "SHA_ARM_PLACEHOLDER"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/kexa-io/homebrew-tap/releases/download/TAG_PLACEHOLDER/kxn-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_LINUX_PLACEHOLDER"
              end
            end

            def install
              bin.install "kxn"
            end

            test do
              assert_match "kxn", shell_output("#{bin}/kxn --version")
            end
          end
          FORMULA
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" kxn.rb
          sed -i "s/TAG_PLACEHOLDER/$TAG/g" kxn.rb
          sed -i "s/SHA_INTEL_PLACEHOLDER/${{ steps.sha.outputs.intel }}/g" kxn.rb
          sed -i "s/SHA_ARM_PLACEHOLDER/${{ steps.sha.outputs.arm }}/g" kxn.rb
          sed -i "s/SHA_LINUX_PLACEHOLDER/${{ steps.sha.outputs.linux }}/g" kxn.rb
          sed -i 's/^          //' kxn.rb

      - name: Push formula to homebrew-tap
        run: |
          CONTENT=$(base64 -w 0 kxn.rb)
          SHA=$(gh api repos/kexa-io/homebrew-tap/contents/Formula/kxn.rb --jq '.sha' 2>/dev/null || echo "")
          if [ -n "$SHA" ]; then
            gh api -X PUT repos/kexa-io/homebrew-tap/contents/Formula/kxn.rb \
              -f message="kxn ${{ steps.version.outputs.version }}" \
              -f content="$CONTENT" \
              -f sha="$SHA"
          else
            gh api -X PUT repos/kexa-io/homebrew-tap/contents/Formula/kxn.rb \
              -f message="kxn ${{ steps.version.outputs.version }}" \
              -f content="$CONTENT"
          fi
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
