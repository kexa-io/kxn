name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-release:
    name: Build and upload release assets
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
    permissions:
      contents: write
    secrets: inherit

  build-docker:
    # kxn is primarily consumed as a server-side container in Kubernetes,
    # where the overwhelming majority of nodes are amd64. Building a multi-arch
    # image previously cost ~1h via QEMU arm64 cross-build for marginal benefit.
    # Stick to amd64 here; native CLI binaries for macOS arm64 (M-series) and
    # other platforms are still produced by the `build-release` workflow above.
    name: Build and push Docker image (linux/amd64)
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY_NAME }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME_KEXA }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD_KEXA }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKER_REGISTRY_NAME }}/kexa/kxn:${{ needs.release-please.outputs.tag_name }}
            ${{ secrets.DOCKER_REGISTRY_NAME }}/kexa/kxn:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-latest-tag:
    name: Update 'latest' tag
    needs: [release-please, build-release]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa latest -m "Latest stable release (${{ needs.release-please.outputs.tag_name }})"
          git push origin latest --force
