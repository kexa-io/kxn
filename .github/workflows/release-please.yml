name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-release:
    name: Build and upload release assets
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
    permissions:
      contents: write
    secrets: inherit

  build-docker:
    # Build amd64 and arm64 in parallel on native runners (no QEMU emulation),
    # then a follow-up job assembles the multi-arch manifest list. This cuts
    # the Docker step from ~1h (QEMU arm64 cross-build) to ~5-10 minutes.
    name: Build Docker image (${{ matrix.platform }})
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch_suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch_suffix: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY_NAME }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME_KEXA }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD_KEXA }}

      - name: Build and push (per-arch tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          # Tag each arch separately so the merge job below can assemble the
          # final manifest list referencing both digests.
          tags: ${{ secrets.DOCKER_REGISTRY_NAME }}/kexa/kxn:${{ needs.release-please.outputs.tag_name }}-${{ matrix.arch_suffix }}
          cache-from: type=gha,scope=${{ matrix.arch_suffix }}
          cache-to: type=gha,scope=${{ matrix.arch_suffix }},mode=max

  build-docker-manifest:
    name: Assemble multi-arch manifest
    needs: [release-please, build-docker]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY_NAME }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME_KEXA }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD_KEXA }}

      - name: Create and push manifest list (versioned + latest)
        run: |
          set -euo pipefail
          IMG="${{ secrets.DOCKER_REGISTRY_NAME }}/kexa/kxn"
          TAG="${{ needs.release-please.outputs.tag_name }}"
          for target in "${TAG}" latest; do
            docker buildx imagetools create -t "${IMG}:${target}" \
              "${IMG}:${TAG}-amd64" \
              "${IMG}:${TAG}-arm64"
          done

  update-latest-tag:
    name: Update 'latest' tag
    needs: [release-please, build-release]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa latest -m "Latest stable release (${{ needs.release-please.outputs.tag_name }})"
          git push origin latest --force
