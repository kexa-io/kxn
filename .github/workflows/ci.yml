name: CI

on:
  pull_request:
    branches: [develop, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check
        run: cargo check --workspace

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --workspace -- -D warnings

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # RUSTSEC-2023-0071: rsa crate Marvin Attack — no upstream patch,
          # kxn only uses rsa for local SSH key parsing (not network-observable).
          # RUSTSEC-2026-0118 / RUSTSEC-2026-0119: hickory-proto 0.25.2 DoS,
          # transitive via reqwest. Awaiting upstream bump to hickory-proto 0.26.x.
          ignore: RUSTSEC-2023-0071,RUSTSEC-2026-0118,RUSTSEC-2026-0119
