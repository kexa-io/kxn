name: Docker publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. 0.35.0)'
        required: true
        default: 'latest'

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY_NAME }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME_KEXA }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD_KEXA }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKER_REGISTRY_NAME }}/kexa/kxn:${{ inputs.tag }}
            ${{ secrets.DOCKER_REGISTRY_NAME }}/kexa/kxn:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
