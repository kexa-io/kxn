# kxn.toml — Company scan configuration
#
# mandatory: always enforced, cannot be disabled by users
# optional:  available rule sets, enabled/disabled per profile
#
# Usage:
#   kxn scan                          # mandatory + default-enabled optional
#   kxn scan --enable mysql-cis       # also enable mysql-cis
#   kxn scan --disable http-security  # disable an optional set
#   kxn scan --only mandatory         # only mandatory rules
#   kxn scan --all                    # everything

[rules]
# Global filters applied on top of everything
min_level = 0
# exclude = ["*-deprecated"]

# Always enforced — cannot be disabled
[[rules.mandatory]]
name = "ssh-cis"
path = "rules/ssh-cis.toml"

[[rules.mandatory]]
name = "http-security"
path = "rules/http-security.toml"

[[rules.mandatory]]
name = "monitoring"
path = "rules/monitoring.toml"

# Optional rule sets — toggled by name
[[rules.optional]]
name = "postgresql-cis"
path = "rules/postgresql-cis.toml"
enabled = true                        # enabled by default

[[rules.optional]]
name = "mysql-cis"
path = "rules/mysql-cis.toml"
enabled = false                       # must be explicitly enabled

[[rules.optional]]
name = "postgresql-monitoring"
path = "rules/postgresql-monitoring.toml"
enabled = true

[[rules.optional]]
name = "mysql-monitoring"
path = "rules/mysql-monitoring.toml"
enabled = true

[[rules.optional]]
name = "mongodb-monitoring"
path = "rules/mongodb-monitoring.toml"
enabled = true

[[rules.optional]]
name = "cve-monitoring"
path = "rules/cve-monitoring.toml"
enabled = true

# Save scan results to databases (for Grafana dashboards)
[[save]]
type = "postgres"
url = "postgresql://${secret:gcp:my-gcp-project/kxn-db-user}:${secret:gcp:my-gcp-project/kxn-db-password}@postgresql:5432/kxn"
origin = "kxn-daemon"
only_errors = false
[save.tags]
environment = "production"

[[save]]
type = "mongodb"
url = "mongodb://mysql:27017/kxn"
origin = "kxn-daemon"
only_errors = false
[save.tags]
environment = "production"

# Daemon mode targets — used by `kxn watch`
# Each target runs independently with its own interval and webhooks

[[targets]]
name = "postgresql"
uri = "postgresql://postgres:${secret:gcp:my-gcp-project/pg-password}@postgresql:5432/postgres"
rules = ["postgresql-cis", "postgresql-monitoring", "postgresql-dba"]
interval = 60

[[targets]]
name = "mysql"
uri = "mysql://root:${secret:gcp:my-gcp-project/mysql-password}@mysql:3306/mysql"
rules = ["mysql-cis", "mysql-monitoring", "mysql-dba"]
interval = 60

[[targets]]
name = "oracle-ssh"
uri = "ssh://root@oracle"
rules = ["ssh-cis", "monitoring", "ssh-monitoring"]
interval = 60

[[targets]]
name = "pg-ssh"
uri = "ssh://root@postgresql"
rules = ["ssh-cis", "monitoring"]
interval = 60

[[targets]]
name = "mysql-ssh"
uri = "ssh://root@mysql"
rules = ["ssh-cis", "monitoring"]
interval = 60

# CVE vulnerability feeds — public NVD + CISA KEV + EPSS
[[targets]]
name = "cve-watch"
provider = "cve"
rules = ["cve-monitoring"]
interval = 3600
[targets.config]
# Feed URLs (defaults to public NVD/KEV/EPSS — override for self-hosted)
# NVD_URL = "https://services.nvd.nist.gov/rest/json/cves/2.0"
# KEV_URL = "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"
# EPSS_URL = "https://api.first.org/data/v1/epss"
# NVD_API_KEY = "${NVD_API_KEY}"           # optional, increases rate limit
KEYWORDS = "openssh,postgresql,mysql,nginx,linux"
SEVERITY = "HIGH"                           # minimum severity: LOW, MEDIUM, HIGH, CRITICAL
DAYS_BACK = "7"                             # look back N days
MAX_RESULTS = "50"
