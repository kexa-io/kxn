# kxn-stack — All-in-one observability stack for Kubernetes.
#
# Installs PostgreSQL (with kxn schema) + kxn-monitor + collectors + Grafana
# (with 19 dashboards auto-imported) in one shot.
#
#   helm install kxn-stack ./kxn-stack \
#     --namespace kxn --create-namespace \
#     --set webhooks.discord=https://discord.com/api/webhooks/...
#
# Webhook URL is optional — without it, Discord/Slack alerts are disabled
# but everything else (compliance scans, dashboards, collectors) works.

# Webhook destinations. Provide at least one (discord/slack/teams/generic) to
# get alerts. If none is set, kxn-monitor still runs but doesn't push alerts.
webhooks:
  discord: ""
  slack: ""
  teams: ""
  generic: ""

# ---------------------------------------------------------------------------
# Backend selection — where kxn pushes scan results, metrics and logs.
# Choose one: postgres | loki | mongo.
#
#  - postgres : default. Deploys a PostgreSQL StatefulSet, applies the kxn
#               SQL schema and lights up the 19 SQL-based Grafana dashboards.
#  - loki     : deploys Loki (single-binary) and configures kxn save to push
#               via /loki/api/v1/push. Grafana datasource = Loki. The SQL
#               dashboards do not apply; use LogQL instead.
#  - mongo    : deploys a MongoDB single-replica and configures kxn save to
#               push to a kxn database. Grafana needs the mongodb-datasource
#               plugin and a per-collection dashboard set.
# ---------------------------------------------------------------------------
backend:
  type: postgres   # postgres | loki | mongo

# ---------------------------------------------------------------------------
# kxn-monitor — continuous compliance scan + alerts (sub-chart)
# ---------------------------------------------------------------------------
kxn-monitor:
  enabled: true
  webhooks:
    secretName: kxn-stack-webhooks   # auto-created by this umbrella chart
    secretKey: discord
    alertIntervalSeconds: 3600
    minLevel: 2
  targets:
    kubernetes:
      enabled: true
      intervalSeconds: 30
    postgresql:
      enabled: true
      name: kxn-pg
      intervalSeconds: 60
      host: kxn-stack-postgresql
      user: kxn
      port: 5432
      database: kxn
      passwordSecret:
        name: kxn-stack-postgresql
        key: password
  customRules:
    enabled: true
    files:
      cluster-health.toml: |
        [metadata]
        version = "1.0.0"
        provider = "kubernetes"
        description = "Cluster health"
        [[rules]]
        name = "pod-not-failed"
        description = "Pod must not be in Failed state"
        level = 3
        object = "pods"
          [[rules.conditions]]
          property = "phase"
          condition = "DIFFERENT"
          value = "Failed"
        [[rules]]
        name = "k8s-nodes-not-ready"
        description = "All nodes must be Ready"
        level = 3
        object = "cluster_stats"
          [[rules.conditions]]
          property = "nodes_not_ready"
          condition = "EQUAL"
          value = 0
        [[rules]]
        name = "k8s-pods-pending-too-many"
        description = "More than 3 pods stuck in Pending"
        level = 2
        object = "cluster_stats"
          [[rules.conditions]]
          property = "pods_pending"
          condition = "INF"
          value = 4
      postgres-app.toml: |
        [metadata]
        version = "1.0.0"
        provider = "postgresql"
        description = "Postgres health"
        [[rules]]
        name = "pg-cache-hit-ratio"
        description = "Cache hit ratio < 50% (sustained disk pressure)"
        level = 1
        object = "db_stats"
          [[rules.conditions]]
          property = "cache_hit_ratio"
          condition = "SUP"
          value = 50
        [[rules]]
        name = "pg-connections-high"
        description = "Active connections > 80"
        level = 1
        object = "db_stats"
          [[rules.conditions]]
          property = "active_connections"
          condition = "INF"
          value = 80
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false  # no Prometheus in this stack
  save:
    enabled: true
    type: postgres
    urlEnvVar: KXN_PG_URL
    origin: kxn-stack
  k8sInsecureTls: false

# ---------------------------------------------------------------------------
# kxn-logs — separate Deployment running `kxn logs kubernetes://in-cluster`
# in stream mode, batching log lines into the logs table.
# Same Rust binary as kxn-monitor, just a different command. No Python.
# ---------------------------------------------------------------------------
logs:
  enabled: true
  image:
    repository: kexa/kxn
    tag: latest
    pullPolicy: IfNotPresent
  streamBatchLines: 200
  streamBatchMs: 1000
  resources:
    requests: { cpu: 50m, memory: 96Mi }
    limits:   { cpu: 500m, memory: 256Mi }

# ---------------------------------------------------------------------------
# PostgreSQL — kxn save backend. Standalone StatefulSet (NOT Bitnami chart),
# managed by this chart so the password in the secret stays in sync with
# whatever postgres' initdb wrote to the data dir.
# ---------------------------------------------------------------------------
postgresql:
  enabled: true
  image: postgres:18-alpine
  auth:
    username: kxn
    database: kxn
    password: "kxnDemoPwd2026"        # change in production; same value used by initdb + secret
    postgresPassword: "kxnAdminPwd2026"
  persistence:
    size: 10Gi
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 1Gi }

# ---------------------------------------------------------------------------
# Schema-init Job — applies the kxn DB schema after Postgres is ready
# (Helm post-install hook). Runs once per release.
# ---------------------------------------------------------------------------
schemaInit:
  enabled: true
  image: postgres:18-alpine

# ---------------------------------------------------------------------------
# Loki backend (only used when backend.type=loki).
# Deploys a single-binary Loki StatefulSet with filesystem storage.
# ---------------------------------------------------------------------------
loki:
  image:
    repository: grafana/loki
    tag: "3.3.2"
  persistence:
    size: 10Gi
  retentionPeriod: "168h"   # 7 days
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 1Gi }

# ---------------------------------------------------------------------------
# MongoDB backend (only used when backend.type=mongo).
# Deploys a single-replica MongoDB StatefulSet with a kxn user bootstrap.
# ---------------------------------------------------------------------------
mongo:
  image: "mongo:7"
  password: "kxnDemoPwd2026"
  rootPassword: "kxnAdminPwd2026"
  persistence:
    size: 10Gi
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 1Gi }

# ---------------------------------------------------------------------------
# Grafana — visualization. Sidecar picks up dashboard ConfigMaps with the
# `grafana_dashboard=1` label from the release namespace.
# Datasource credentials are wired explicitly via env vars (NOT envFromSecrets,
# which doesn't expose POSTGRES_PASSWORD with the right name).
# ---------------------------------------------------------------------------
grafana:
  enabled: true
  fullnameOverride: kxn-stack-grafana
  adminPassword: kxn-admin
  service:
    type: ClusterIP
  persistence:
    enabled: true
    size: 5Gi
  sidecar:
    image:
      tag: 1.30.0
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: kxn          # NOT 'ALL' — needs cluster-wide RBAC
      folder: kxn
      provider:
        foldersFromFilesStructure: false
    datasources:
      enabled: true
      label: grafana_datasource
      labelValue: "1"
      searchNamespace: kxn
  plugins: []
  # Wire POSTGRES_PASSWORD explicitly so the datasource provisioning yaml's
  # ${POSTGRES_PASSWORD} substitution actually resolves. Without this, the
  # datasource boots with an empty password and every panel says "no data".
  env:
    POSTGRES_HOST: kxn-stack-postgresql
    POSTGRES_DATABASE: kxn
    POSTGRES_USER: kxn
  envValueFrom:
    POSTGRES_PASSWORD:
      secretKeyRef:
        name: kxn-stack-postgresql
        key: password
  # Datasource is provisioned by a sidecar-discovered ConfigMap (see
  # templates/grafana-datasource.yaml) so the right backend (postgres / loki
  # / mongo) is wired in based on .Values.backend.type without sub-chart
  # gymnastics.
  datasources: {}
