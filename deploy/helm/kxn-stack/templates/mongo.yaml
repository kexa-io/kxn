{{- if eq .Values.backend.type "mongo" }}
{{- /*
MongoDB single-replica StatefulSet for kxn save backend. Minimal in-cluster
MongoDB suitable for lab and small production setups. For HA/sharded MongoDB
deploy a dedicated cluster (Bitnami chart, MongoDB Operator) and point kxn
at its connection string instead.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-mongo
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  password:     {{ .Values.mongo.password | quote }}
  rootPassword: {{ .Values.mongo.rootPassword | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-mongo
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: mongo
spec:
  clusterIP: None
  ports:
    - { name: mongo, port: 27017, targetPort: 27017 }
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: mongo
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-mongo
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: mongo
spec:
  serviceName: {{ .Release.Name }}-mongo
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: mongo
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: mongo
    spec:
      containers:
        - name: mongo
          image: "{{ .Values.mongo.image }}"
          ports:
            - { name: mongo, containerPort: 27017 }
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: root
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-mongo
                  key: rootPassword
            - name: MONGO_INITDB_DATABASE
              value: kxn
          readinessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.mongo.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.mongo.persistence.size }}
---
{{- /* Bootstrap the kxn user against the freshly initialised mongod. */}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-mongo-init
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: "{{ .Values.mongo.image }}"
          env:
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-mongo
                  key: password
            - name: MONGO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-mongo
                  key: rootPassword
          command:
            - /bin/sh
            - -c
            - |
              set -e
              for i in $(seq 1 30); do
                if mongosh "mongodb://root:$MONGO_ROOT_PASSWORD@{{ .Release.Name }}-mongo:27017/admin?authSource=admin" --quiet --eval "db.adminCommand('ping').ok" | grep -q 1; then
                  break
                fi
                echo "waiting for mongo... ($i/30)"
                sleep 5
              done
              mongosh "mongodb://root:$MONGO_ROOT_PASSWORD@{{ .Release.Name }}-mongo:27017/admin?authSource=admin" --quiet --eval "
                use kxn;
                db.createUser({
                  user: 'kxn',
                  pwd: '$MONGO_PASSWORD',
                  roles: [{ role: 'readWrite', db: 'kxn' }]
                });
              " || echo "user already exists"
{{- end }}
