{{- /*
Auto-create the webhook secret expected by kxn-monitor. If no webhook URL is
provided, we still create the secret with a placeholder so kxn-monitor's
`secretKeyRef` doesn't fail with CreateContainerConfigError. The placeholder
URL is unreachable so no alert is actually sent.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: kxn-stack-webhooks
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  discord: {{ .Values.webhooks.discord | default "https://example.invalid/no-op" | quote }}
  slack:   {{ .Values.webhooks.slack   | default "https://example.invalid/no-op" | quote }}
  teams:   {{ .Values.webhooks.teams   | default "https://example.invalid/no-op" | quote }}
  generic: {{ .Values.webhooks.generic | default "https://example.invalid/no-op" | quote }}
