{{- if ne .Values.backend.type "postgres" }}
{{- /*
The grafana sub-chart pulls POSTGRES_PASSWORD from the kxn-stack-postgresql
secret regardless of which backend is selected (env wiring is set in
values.yaml.grafana.envValueFrom). When backend != postgres the postgres
template is skipped, so the secret never exists and grafana fails to start
with CreateContainerConfigError.

Create a placeholder secret here so the env reference resolves. Grafana
won't actually use it (the active datasource is loki/mongo, provisioned
via templates/grafana-datasource.yaml).
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: kxn-stack-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  password: "unused-postgres-not-the-active-backend"
{{- end }}
