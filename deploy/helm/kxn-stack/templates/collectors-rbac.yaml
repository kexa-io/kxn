{{- if .Values.collectors.enabled }}
{{- /*
Collectors need read access to a few resources beyond what the kxn-monitor
ServiceAccount already has: nodes/proxy + nodes/stats (kubelet stats),
secrets (TLS certs), pods/log, jobs/cronjobs (already in kxn-monitor RBAC
but we explicitly include them here so the chart is standalone).
*/ -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-collectors
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  - apiGroups: [""]
    resources: [secrets, pods, pods/log, namespaces, nodes, nodes/proxy, nodes/stats, persistentvolumeclaims, services, events]
    verbs: [get, list, watch]
  - apiGroups: [batch]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch]
  - apiGroups: [networking.k8s.io]
    resources: [networkpolicies, ingresses]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments, daemonsets, statefulsets, replicasets]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-collectors
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-collectors
subjects:
  - kind: ServiceAccount
    name: {{ .Values.collectors.serviceAccountName | default "kxn-stack-kxn-monitor" }}
    namespace: {{ .Release.Namespace }}
{{- end }}
