{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kxn-logs.fullname" . }}
  labels:
    {{- include "kxn-logs.labels" . | nindent 4 }}
rules:
  # Pod log streaming requires read access to pods + the pods/log subresource.
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - namespaces
      - nodes
      - events
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kxn-logs.fullname" . }}
  labels:
    {{- include "kxn-logs.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kxn-logs.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kxn-logs.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
