# Compliance Framework Mapping Reference
#
# This file documents how kxn rules map to compliance frameworks.
# Use this as a reference when adding [[rules.compliance]] blocks to rule files.
#
# Supported frameworks:
#   - CIS (Center for Internet Security Benchmarks)
#   - SOC-2 (Trust Services Criteria)
#   - ISO-27001 (Annex A controls)
#   - PCI-DSS (v4.0)
#   - HIPAA (Security Rule)
#   - NIST-800-53

# =============================================================================
# SOC 2 Trust Services Criteria
# =============================================================================

[[frameworks]]
name = "SOC-2"
version = "2017"

  [[frameworks.controls]]
  id = "CC6.1"
  title = "Logical Access"
  description = "Logical and physical access controls to protect against unauthorized access"
  applies_to = ["ssh-auth", "iam", "db-auth", "api-auth", "rbac"]
  rule_patterns = [
    "ssh-cis-5.2.10-no-root-login",
    "ssh-cis-5.2.19-disable-empty-passwords",
    "k8s-cis-5.1.1-no-wildcard-cluster-roles",
    "k8s-cis-5.2.1-no-privileged-containers",
    "k8s-cis-5.2.6-run-as-non-root",
    "k8s-cis-5.1.7-no-system-masters",
  ]

  [[frameworks.controls]]
  id = "CC6.6"
  title = "System Boundaries"
  description = "Security measures to protect system boundaries"
  applies_to = ["firewall", "network-policies", "security-groups"]
  rule_patterns = [
    "k8s-cis-5.3.2-namespaces-have-network-policies",
  ]

  [[frameworks.controls]]
  id = "CC6.7"
  title = "Data Transmission"
  description = "Encryption and protection of data in transit"
  applies_to = ["tls", "encryption", "hsts"]
  rule_patterns = [
    "http-tls-certificate-present",
    "http-hsts-header",
    "http-tls-connected",
    "ssh-cis-5.2.15-strong-ciphers",
  ]

  [[frameworks.controls]]
  id = "CC7.1"
  title = "Monitoring"
  description = "Detection and monitoring of anomalies and events"
  applies_to = ["system-monitoring", "db-monitoring", "http-monitoring"]
  rule_patterns = [
    "cpu-usage-critical",
    "memory-usage-critical",
    "disk-usage-critical",
  ]

  [[frameworks.controls]]
  id = "CC7.2"
  title = "Incident Detection"
  description = "Anomalies are analyzed and incidents are identified"
  applies_to = ["log-monitoring", "alerting"]
  rule_patterns = [
    "oom-killer-invocations",
  ]

  [[frameworks.controls]]
  id = "CC8.1"
  title = "Change Management"
  description = "Changes to infrastructure and software are authorized and managed"
  applies_to = ["k8s-deployments"]
  rule_patterns = [
    "k8s-deployments-fully-available",
  ]

# =============================================================================
# ISO 27001 Annex A
# =============================================================================

[[frameworks]]
name = "ISO-27001"
version = "2022"

  [[frameworks.controls]]
  id = "A.8.2"
  title = "Access Control"
  description = "Privileged access rights and multi-factor authentication"
  applies_to = ["auth", "mfa"]
  rule_patterns = []

  [[frameworks.controls]]
  id = "A.8.5"
  title = "Secure Authentication"
  description = "Secure authentication technologies and procedures"
  applies_to = ["ssh-auth", "db-auth", "password-policy"]
  rule_patterns = [
    "ssh-cis-5.2.10-no-root-login",
    "ssh-cis-5.2.19-disable-empty-passwords",
    "ssh-cis-5.2.5-max-auth-tries",
  ]

  [[frameworks.controls]]
  id = "A.8.9"
  title = "Configuration Management"
  description = "Configurations including security configurations are established and managed"
  applies_to = ["cis-hardening", "system-config"]
  rule_patterns = [
    "ssh-cis-5.2.4-protocol-2",
    "k8s-cis-5.2.1-no-privileged-containers",
    "k8s-cis-5.2.2-no-host-pid",
    "k8s-cis-5.2.6-run-as-non-root",
  ]

  [[frameworks.controls]]
  id = "A.8.15"
  title = "Logging"
  description = "Logs that record activities, exceptions, faults are produced and stored"
  applies_to = ["audit-logs", "monitoring"]
  rule_patterns = [
    "cpu-usage-critical",
    "memory-usage-critical",
    "disk-usage-critical",
    "oom-killer-invocations",
  ]

  [[frameworks.controls]]
  id = "A.8.20"
  title = "Network Security"
  description = "Networks and network devices are secured, managed and controlled"
  applies_to = ["network", "firewall", "tls", "http-headers"]
  rule_patterns = [
    "http-hsts-header",
    "http-x-frame-options",
    "http-csp-header",
  ]

  [[frameworks.controls]]
  id = "A.8.24"
  title = "Cryptography"
  description = "Rules for effective use of cryptography including key management"
  applies_to = ["tls", "ciphers", "encryption"]
  rule_patterns = [
    "http-tls-certificate-present",
    "http-tls-connected",
    "ssh-cis-5.2.15-strong-ciphers",
  ]

# =============================================================================
# PCI-DSS v4.0
# =============================================================================

[[frameworks]]
name = "PCI-DSS"
version = "4.0"

  [[frameworks.controls]]
  id = "2.2"
  title = "System Hardening"
  description = "System components are configured and managed securely"
  applies_to = ["ssh-cis", "linux-cis", "k8s-cis"]
  rule_patterns = [
    "ssh-cis-5.2.4-protocol-2",
    "k8s-cis-5.1.1-no-wildcard-cluster-roles",
    "k8s-cis-5.2.1-no-privileged-containers",
    "k8s-cis-5.2.2-no-host-pid",
    "k8s-cis-5.2.6-run-as-non-root",
    "k8s-cis-5.1.7-no-system-masters",
  ]

  [[frameworks.controls]]
  id = "4.1"
  title = "Encryption in Transit"
  description = "Strong cryptography protects cardholder data during transmission"
  applies_to = ["tls", "encryption"]
  rule_patterns = [
    "http-tls-certificate-present",
    "http-hsts-header",
    "http-tls-connected",
    "ssh-cis-5.2.15-strong-ciphers",
  ]

  [[frameworks.controls]]
  id = "6.4"
  title = "Security Headers"
  description = "Public-facing web applications are protected against attacks"
  applies_to = ["http-security-headers"]
  rule_patterns = [
    "http-hsts-header",
    "http-x-frame-options",
    "http-csp-header",
  ]

  [[frameworks.controls]]
  id = "8.3"
  title = "Strong Authentication"
  description = "Strong authentication for users and administrators is established"
  applies_to = ["mfa", "password-policy", "auth"]
  rule_patterns = [
    "ssh-cis-5.2.19-disable-empty-passwords",
    "ssh-cis-5.2.5-max-auth-tries",
  ]

  [[frameworks.controls]]
  id = "10.2"
  title = "Audit Logging"
  description = "Audit logs are implemented to support detection of anomalies"
  applies_to = ["log-monitoring"]
  rule_patterns = [
    "ssh-cis-5.2.2-loglevel",
  ]

  [[frameworks.controls]]
  id = "11.5"
  title = "Change Detection"
  description = "Network intrusions and unexpected file changes are detected"
  applies_to = ["file-integrity"]
  rule_patterns = [
    "ssh-cis-5.2.1-sshd-config-owner-root",
    "ssh-cis-5.2.3-sshd-config-permissions",
  ]

# =============================================================================
# HIPAA Security Rule
# =============================================================================

[[frameworks]]
name = "HIPAA"
version = "2013"

  [[frameworks.controls]]
  id = "164.312(a)(1)"
  title = "Access Control"
  description = "Implement technical policies and procedures for electronic information systems"
  applies_to = ["auth", "iam"]
  rule_patterns = [
    "ssh-cis-5.2.10-no-root-login",
    "ssh-cis-5.2.19-disable-empty-passwords",
  ]

  [[frameworks.controls]]
  id = "164.312(e)(1)"
  title = "Transmission Security"
  description = "Implement technical security measures to guard against unauthorized access to ePHI"
  applies_to = ["tls", "encryption"]
  rule_patterns = [
    "http-tls-certificate-present",
    "http-tls-connected",
    "ssh-cis-5.2.15-strong-ciphers",
  ]

  [[frameworks.controls]]
  id = "164.312(b)"
  title = "Audit Controls"
  description = "Implement mechanisms to record and examine activity in information systems"
  applies_to = ["logging", "audit"]
  rule_patterns = [
    "ssh-cis-5.2.2-loglevel",
  ]

# =============================================================================
# NIST 800-53
# =============================================================================

[[frameworks]]
name = "NIST-800-53"
version = "Rev 5"

  [[frameworks.controls]]
  id = "AC-2"
  title = "Account Management"
  description = "Manage information system accounts including establishing, activating, modifying, reviewing, disabling, and removing accounts"
  applies_to = ["iam", "user-management", "rbac"]
  rule_patterns = [
    "k8s-cis-5.1.1-no-wildcard-cluster-roles",
    "k8s-cis-5.2.1-no-privileged-containers",
    "k8s-cis-5.1.7-no-system-masters",
  ]

  [[frameworks.controls]]
  id = "AC-7"
  title = "Unsuccessful Logon Attempts"
  description = "Enforce a limit of consecutive invalid logon attempts and take action when limit exceeded"
  applies_to = ["ssh-auth", "login-policy"]
  rule_patterns = [
    "ssh-cis-5.2.10-no-root-login",
    "ssh-cis-5.2.19-disable-empty-passwords",
    "ssh-cis-5.2.5-max-auth-tries",
  ]

  [[frameworks.controls]]
  id = "AU-2"
  title = "Audit Events"
  description = "Identify events that the system is capable of auditing"
  applies_to = ["logging", "audit"]
  rule_patterns = [
    "ssh-cis-5.2.2-loglevel",
  ]

  [[frameworks.controls]]
  id = "SC-8"
  title = "Transmission Confidentiality"
  description = "Protect the confidentiality and integrity of transmitted information"
  applies_to = ["tls", "encryption"]
  rule_patterns = [
    "http-tls-certificate-present",
    "http-tls-connected",
    "ssh-cis-5.2.4-protocol-2",
    "ssh-cis-5.2.15-strong-ciphers",
  ]

  [[frameworks.controls]]
  id = "SI-4"
  title = "System Monitoring"
  description = "Monitor the system to detect attacks, indicators of potential attacks, and unauthorized connections"
  applies_to = ["monitoring", "alerting"]
  rule_patterns = [
    "cpu-usage-critical",
    "memory-usage-critical",
    "disk-usage-critical",
    "oom-killer-invocations",
  ]
