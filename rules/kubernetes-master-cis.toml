[metadata]
version = "1.0.0"
provider = "ssh"
description = "CIS Kubernetes Benchmark — Control Plane (Sections 1-2) via SSH to master node"
tags = ["cis", "kubernetes", "master", "control-plane", "security"]

# =============================================================================
# 1.1 Control Plane Node Configuration Files
# =============================================================================

[[rules]]
name = "k8s-master-cis-1.1.1-apiserver-manifest-permissions"
description = "CIS 1.1.1 - Ensure API server pod specification file permissions are 600 or more restrictive"
level = 1
object = "k8s_master_config"

  [[rules.compliance]]
  framework = "CIS"
  control = "1.1.1"
  section = "Control Plane Node Configuration Files"

  [[rules.conditions]]
  property = "kube_apiserver_yaml_mode"
  condition = "INF_OR_EQUAL"
  value = "600"

  [[rules.remediation]]
  type = "shell"
  command = "chmod 600 /etc/kubernetes/manifests/kube-apiserver.yaml && chown root:root /etc/kubernetes/manifests/kube-apiserver.yaml"
  timeout = 15

[[rules]]
name = "k8s-master-cis-1.1.2-apiserver-manifest-ownership"
description = "CIS 1.1.2 - Ensure API server pod specification file ownership is root:root"
