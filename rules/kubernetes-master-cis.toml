level = 1
object = "k8s_master_config"

  [[rules.compliance]]
  framework = "CIS"
  control = "1.2.3"
  section = "API Server"

  [[rules.conditions]]
  property = "apiserver_enable_admission_plugins"
  condition = "INCLUDE"
  value = "DenyServiceExternalIPs"

