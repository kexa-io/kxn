[metadata]
version = "1.0.0"
provider = "ssh"
description = "System monitoring rules — CPU, memory, disk, network, swap, load"
tags = ["monitoring", "ssh", "system", "performance"]

[[rules]]
name = "cpu-usage-critical"
description = "CPU usage should not exceed 90%"
level = 3
object = "system_stats"
tags = ["cpu", "critical"]

  [[rules.compliance]]
  framework = "SOC-2"
  control = "CC7.1"
  section = "Monitoring"

  [[rules.compliance]]
  framework = "ISO-27001"
  control = "A.8.15"
  section = "Logging"

  [[rules.compliance]]
  framework = "NIST-800-53"
  control = "SI-4"
  section = "System Monitoring"

  [[rules.conditions]]
  property = "cpu_percent"
  condition = "INF"
  value = 90

[[rules]]
name = "cpu-usage-warning"
description = "CPU usage should not exceed 80%"
level = 1
object = "system_stats"
tags = ["cpu", "warning"]

  [[rules.conditions]]
  property = "cpu_percent"
  condition = "INF"
  value = 80

[[rules]]
name = "memory-usage-critical"
description = "Memory usage should not exceed 90%"
level = 3
object = "system_stats"
tags = ["memory", "critical"]

  [[rules.compliance]]
  framework = "SOC-2"
  control = "CC7.1"
  section = "Monitoring"

  [[rules.compliance]]
  framework = "ISO-27001"
  control = "A.8.15"
  section = "Logging"

  [[rules.compliance]]
  framework = "NIST-800-53"
  control = "SI-4"
  section = "System Monitoring"

  [[rules.conditions]]
  property = "memory_percent"
  condition = "INF"
  value = 90

[[rules]]
name = "memory-usage-warning"
description = "Memory usage should not exceed 80%"
level = 1
object = "system_stats"
tags = ["memory", "warning"]

  [[rules.conditions]]
  property = "memory_percent"
  condition = "INF"
  value = 80

[[rules]]
name = "disk-usage-critical"
description = "Disk usage should not exceed 90%"
level = 3
object = "system_stats"
tags = ["disk", "critical"]

  [[rules.compliance]]
  framework = "SOC-2"
  control = "CC7.1"
  section = "Monitoring"

  [[rules.compliance]]
  framework = "ISO-27001"
  control = "A.8.15"
  section = "Logging"

  [[rules.compliance]]
  framework = "NIST-800-53"
  control = "SI-4"
  section = "System Monitoring"

  [[rules.conditions]]
  property = "disk_percent"
  condition = "INF"
  value = 90

[[rules]]
name = "disk-usage-warning"
description = "Disk usage should not exceed 80%"
level = 1
object = "system_stats"
tags = ["disk", "warning"]

  [[rules.conditions]]
  property = "disk_percent"
  condition = "INF"
  value = 80

[[rules]]
name = "load-average-high"
description = "Load average (1m) should not exceed 4"
level = 2
object = "system_stats"
tags = ["load", "performance"]

  [[rules.conditions]]
  property = "load_1m"
  condition = "INF"
  value = 4

[[rules]]
name = "process-count-high"
description = "Process count should not exceed 500"
level = 1
object = "system_stats"
tags = ["process", "performance"]

  [[rules.conditions]]
  property = "process_count"
  condition = "INF"
  value = 500

[[rules]]
name = "swap-usage-critical"
description = "Swap usage should not exceed 80%"
level = 3
object = "system_stats"
tags = ["swap", "critical"]

  [[rules.conditions]]
  property = "swap_percent"
  condition = "INF"
  value = 80

  [[rules.remediation]]
  type = "shell"
  command = "sync && swapoff -a && swapon -a && echo 'swap cleared'"
  timeout = 30

[[rules]]
name = "swap-usage-warning"
description = "Swap usage should not exceed 50%"
level = 1
object = "system_stats"
tags = ["swap", "warning"]

  [[rules.conditions]]
  property = "swap_percent"
  condition = "INF"
  value = 50

[[rules]]
name = "open-files-high"
description = "Open file descriptors should not exceed 80% of max"
level = 2
object = "system_stats"
tags = ["files", "performance"]

  [[rules.conditions]]
  property = "open_files"
  condition = "INF"
  value = 800000

[[rules]]
name = "network-rx-errors"
description = "Network receive errors should be 0"
level = 2
object = "system_stats"
tags = ["network", "errors"]

  [[rules.conditions]]
  property = "net_rx_errors"
  condition = "EQUAL"
  value = 0

[[rules]]
name = "network-tx-errors"
description = "Network transmit errors should be 0"
level = 2
object = "system_stats"
tags = ["network", "errors"]

  [[rules.conditions]]
  property = "net_tx_errors"
  condition = "EQUAL"
  value = 0

# --- Uptime & Services ---

[[rules]]
name = "uptime-minimum"
description = "System uptime should be over 1 hour (detect unexpected reboots)"
level = 2
object = "system_stats"
tags = ["uptime", "stability"]

  [[rules.conditions]]
  property = "uptime_seconds"
  condition = "SUP"
  value = 3600

[[rules]]
name = "zombie-processes"
description = "Zombie processes should be 0"
level = 2
object = "system_stats"
tags = ["process", "health"]

  [[rules.conditions]]
  property = "zombie_count"
  condition = "EQUAL"
  value = 0

  [[rules.remediation]]
  type = "shell"
  command = "ps -eo pid,stat,comm | awk '$2 ~ /Z/ {print $1}' | xargs -r kill -9 2>/dev/null; echo 'zombies cleaned'"
  timeout = 10

[[rules]]
name = "inode-usage-critical"
description = "Inode usage should not exceed 90%"
level = 3
object = "system_stats"
tags = ["disk", "inodes", "critical"]

  [[rules.conditions]]
  property = "inode_percent"
  condition = "INF"
  value = 90

[[rules]]
name = "inode-usage-warning"
description = "Inode usage should not exceed 80%"
level = 1
object = "system_stats"
tags = ["disk", "inodes", "warning"]

  [[rules.conditions]]
  property = "inode_percent"
  condition = "INF"
  value = 80

[[rules]]
name = "oom-killer-invocations"
description = "OOM killer should not have been invoked recently"
level = 3
object = "system_stats"
tags = ["memory", "oom", "critical"]

  [[rules.compliance]]
  framework = "SOC-2"
  control = "CC7.2"
  section = "Incident Detection"

  [[rules.compliance]]
  framework = "ISO-27001"
  control = "A.8.15"
  section = "Logging"

  [[rules.compliance]]
  framework = "NIST-800-53"
  control = "SI-4"
  section = "System Monitoring"

  [[rules.conditions]]
  property = "oom_kill_count"
  condition = "EQUAL"
  value = 0

  [[rules.remediation]]
  type = "shell"
  command = "dmesg -C && echo 1 > /proc/sys/vm/overcommit_memory && echo 'OOM log cleared, overcommit set to always'"
  timeout = 10

[[rules]]
name = "ntp-synchronized"
description = "System clock should be NTP synchronized"
level = 1
object = "system_stats"
tags = ["ntp", "time"]

  [[rules.conditions]]
  property = "ntp_synchronized"
  condition = "EQUAL"
  value = true

  [[rules.remediation]]
  type = "shell"
  command = "apt-get install -y chrony 2>/dev/null || yum install -y chrony 2>/dev/null; systemctl enable chrony && systemctl start chrony && chronyc makestep"
  timeout = 30

[[rules]]
name = "load-average-15m"
description = "Load average (15m) should not exceed number of CPUs"
level = 2
object = "system_stats"
tags = ["load", "performance"]

  [[rules.conditions]]
  property = "load_15m_per_cpu"
  condition = "INF"
  value = 1.0

[[rules]]
name = "disk-io-utilization-high"
description = "Disk I/O utilization should not exceed 90%"
level = 2
object = "system_stats"
tags = ["disk", "io", "performance"]

  [[rules.conditions]]
  property = "disk_io_util_percent"
  condition = "INF"
  value = 90

[[rules]]
name = "network-dropped-packets"
description = "Network dropped packets should be 0"
level = 1
object = "system_stats"
tags = ["network", "drops"]

  [[rules.conditions]]
  property = "net_rx_dropped"
  condition = "EQUAL"
  value = 0

[[rules]]
name = "conntrack-usage-high"
description = "Connection tracking table usage should not exceed 80%"
level = 2
object = "system_stats"
tags = ["network", "conntrack"]

  [[rules.conditions]]
  property = "conntrack_percent"
  condition = "INF"
  value = 80
