[metadata]
version = "1.0.0"
provider = "postgresql"
description = "Database log monitoring rules — detect errors and slow queries across all DB providers"
tags = ["monitoring", "logs", "database"]

[[rules]]
name = "db-log-errors"
description = "Database should have no recent error log entries"
level = 2
object = "logs"
tags = ["errors", "database"]

  [[rules.conditions]]
  property = "error_count"
  condition = "EQUAL"
  value = 0

[[rules]]
name = "db-log-warnings"
description = "Database warnings should be minimal"
level = 1
object = "logs"
tags = ["warnings", "database"]

  [[rules.conditions]]
  property = "warning_count"
  condition = "INF"
  value = 20

[[rules]]
name = "db-slow-queries"
description = "Slow query log entries should be minimal"
level = 1
object = "logs"
tags = ["slow", "performance"]

  [[rules.conditions]]
  property = "slow_query_count"
  condition = "INF"
  value = 50
